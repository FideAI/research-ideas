name: Build research ideas feed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run build:feed
      - run: git diff --exit-code dist/research-ideas.json
